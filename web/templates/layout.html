{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — c0de-webhook</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="app-layout">
    <div class="topbar">
        <button class="topbar-toggle" onclick="toggleSidebar()" aria-label="Toggle navigation">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <a href="/dashboard" class="topbar-logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
            c0de-webhook
        </a>
    </div>

    <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-link{{if eq .ActiveNav "dashboard"}} active{{end}}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                Dashboard
            </a>
            <a href="/tokens" class="nav-link{{if eq .ActiveNav "tokens"}} active{{end}}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.3 9.3"/><path d="m17 6 4-4"/><path d="m21 6-4-4"/></svg>
                API Tokens
            </a>
            <a href="/queue" class="nav-link{{if eq .ActiveNav "queue"}} active{{end}}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                Queue
            </a>
            <a href="/settings" class="nav-link{{if eq .ActiveNav "settings"}} active{{end}}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="4" y1="21" y2="14"/><line x1="4" x2="4" y1="10" y2="3"/><line x1="12" x2="12" y1="21" y2="12"/><line x1="12" x2="12" y1="8" y2="3"/><line x1="20" x2="20" y1="21" y2="16"/><line x1="20" x2="20" y1="12" y2="3"/><line x1="2" x2="6" y1="14" y2="14"/><line x1="10" x2="14" y1="8" y2="8"/><line x1="18" x2="22" y1="16" y2="16"/></svg>
                Settings
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout" class="nav-link nav-logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                Logout
            </a>
        </div>
    </aside>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
        <header class="page-header">
            <h1 class="page-title">{{.Title}}</h1>
        </header>
        {{if .Flash}}
        <div class="flash-message">{{.Flash}}</div>
        {{end}}
        <div class="page-body">
            {{block "content" .}}{{end}}
        </div>
    </main>

    <script>
    function toggleSidebar() {
        var sb = document.getElementById('sidebar');
        sb.classList.toggle('collapsed');
        sb.classList.toggle('open');
        var main = document.querySelector('.main-content');
        if (sb.classList.contains('collapsed')) {
            main.style.marginLeft = '0';
        } else {
            main.style.marginLeft = '';
        }
    }
    // On desktop, start with sidebar visible
    (function() {
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.add('collapsed');
        }
    })();
    </script>
</body>
</html>
{{end}}
